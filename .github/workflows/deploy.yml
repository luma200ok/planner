name: Planner Server CI/CD

# OCI(A, oci-arm1) 배포 — systemd 서비스 방식
# 시크릿은 서버의 /etc/app-secrets/planner.env 에 보관.

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 코드 체크아웃
        uses: actions/checkout@v4

      - name: 2. JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 3. 빌드 (테스트 제외)
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test

      - name: 4. jar 업로드 (staging)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/*SNAPSHOT.jar"
          target: "/home/opc/apps/planner/staging"
          strip_components: 2
          rm: true

      - name: 5. 배포 + 재시작 + 헬스체크
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP=planner; PORT=8089
            JAR=$(ls /home/opc/apps/$APP/staging/*.jar | grep -v plain | head -1)
            echo "> 배포 jar: $JAR"
            cp "$JAR" /home/opc/apps/$APP/$APP.jar
            rm -rf /home/opc/apps/$APP/staging
            sudo systemctl restart $APP
            echo "> 재시작, 헬스체크..."
            for i in $(seq 1 12); do
              sleep 5
              CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:$PORT/ 2>/dev/null || echo 000)
              if [ "$CODE" != "000" ]; then echo "> ✅ $APP 정상 (HTTP $CODE)"; exit 0; fi
              echo "> 시도 $i/12 (HTTP $CODE)..."
            done
            echo "> ❌ $APP 기동 실패"; sudo journalctl -u $APP -n 40 --no-pager; exit 1
